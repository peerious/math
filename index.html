<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Speed Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🧮 Math Speed Challenge</h1>

    <div class="setup-panel">

        <div class="section">
            <h3>Difficulty</h3>

            <label>
                <input type="radio" name="difficulty" value="1" checked>
                1 Digit
            </label>

            <label>
                <input type="radio" name="difficulty" value="2">
                2 Digits
            </label>

            <label>
                <input type="radio" name="difficulty" value="mixed">
                Mixed
            </label>
        </div>

        <div class="section">
            <h3>Operations</h3>

            <label><input type="checkbox" value="+" class="op" checked> + </label>
            <label><input type="checkbox" value="-" class="op" checked> - </label>
            <label><input type="checkbox" value="*" class="op" checked> × </label>
            <label><input type="checkbox" value="/" class="op" checked> ÷ </label>
        </div>

<label for="gameTime"><h3>Time Limit</h3></label>

<select id="gameTime"> <option value="30">30 Seconds</option> <option value="60" selected>60 Seconds</option> <option value="120">120 Seconds</option> <option value="180">180 Seconds</option> <option value="300">300 Seconds</option> </select>

        <button id="startBtn">Start Game</button>

    </div>

    <div id="gameArea" class="hidden">

<div class="game-layout">

    <div class="question-box">

        <div id="question" class="question">
            5 + 5 = ?
        </div>

        <input
            type="number"
            id="answer"
            placeholder="Your answer"
            autocomplete="off">

        <button id="submitBtn">
            Submit
        </button>

    </div>

    <div class="side-panel">

        <div class="card">
            <span>⏱ Time</span>
            <h2 id="time">60</h2>
        </div>

        <div class="card">
            <span>🏆 Score</span>
            <h2 id="score">0</h2>
        </div>

        <div class="card">
            <span>🎯 Accuracy</span>
            <h2 id="accuracy">100%</h2>
        </div>

    </div>

</div>

        <div class="stats">

            <div>✅ Correct: <span id="correct">0</span></div>
            <div>❌ Wrong: <span id="wrong">0</span></div>
            <div>📚 Total: <span id="total">0</span></div>

        </div>

    </div>

    <div id="resultArea" class="hidden">

        <h2>Game Over</h2>

        <div class="result-grid">

            <div class="result-card">
                <span>Final Score</span>
                <h2 id="finalScore"></h2>
            </div>

            <div class="result-card">
                <span>Correct</span>
                <h2 id="finalCorrect"></h2>
            </div>

            <div class="result-card">
                <span>Wrong</span>
                <h2 id="finalWrong"></h2>
            </div>

            <div class="result-card">
                <span>Accuracy</span>
                <h2 id="finalAccuracy"></h2>
            </div>

        </div>

        <div class="leaderboard">

            <h3>🏅 Top Scores</h3>

            <ol id="leaderboardList">

            </ol>

        </div>

        <button id="playAgain">
            Play Again
        </button>

    </div>

</div>

<script src="game.js"></script>

</body>
</html>
